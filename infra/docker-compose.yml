name: btdamageresolver
services:
  # Battletech Damage Resolver (orleans silo)
  resolver:
    container_name: resolver
    hostname: resolver
    image: resolver:latest
    environment:
      DOTNET_ENVIRONMENT: Release
      ConnectionStrings__Postgres: "User ID=${RESOLVER_USER:?err};Password=${RESOLVER_PASSWORD:?err};Host=resolverpostgres;Port=5432;Database=BtDamageResolver;SSL Mode=Disable;"
      ConnectionStrings__Redis: "redis:6379,password=${RESOLVER_PASSWORD:?err}"
    networks:
      - resolvernet
    depends_on:
      resolverpostgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # Battletech Damage Resolver Client
  resolverclient:
    container_name: resolverclient
    hostname: resolverclient
    image: resolverclient:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Release
      ConnectionStrings__Redis: "redis:6379,password=${RESOLVER_PASSWORD:?err}"
    ports:
      - 8787:8080
    volumes:
      - resolverclient-dpkeys:/app/dpkeys
    networks:
      - resolvernet
    depends_on:
      - resolver
    restart: on-failure

  # Data Importer
  resolverdataimporter:
    container_name: resolverdataimporter
    hostname: resolverdataimporter
    image: resolverdataimporter:latest
    environment:
      DOTNET_ENVIRONMENT: Release
      ConnectionStrings__Redis: "redis:6379,password=${RESOLVER_PASSWORD:?err}"
    networks:
      - resolvernet
    depends_on:
      redis:
        condition: service_healthy

  # Data Exporter
  resolverdataexporter:
    profiles: ["export"]
    container_name: resolverdataexporter
    hostname: resolverdataexporter
    image: resolverdataexporter:latest
    environment:
      DOTNET_ENVIRONMENT: Release
      ConnectionStrings__Redis: "redis:6379,password=${RESOLVER_PASSWORD:?err}"
    networks:
      - resolvernet
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./tmp:/app/data

  # Grafana
  grafana:
    container_name: grafana
    image: resolvergrafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: "${RESOLVER_USER:?err}"
      GF_SECURITY_ADMIN_PASSWORD: "${RESOLVER_PASSWORD:?err}"
      DATASOURCE_USER: "${RESOLVER_USER:?err}"
      DATASOURCE_PASSWORD: "${RESOLVER_PASSWORD:?err}"
    ports:
      - 63000:3000
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - resolvernet
    depends_on:
      resolverpostgres:
        condition: service_healthy
    restart: on-failure

  # Postgresql
  resolverpostgres:
    container_name: resolverpostgres
    hostname: resolverpostgres
    image: resolverpostgres:latest
    environment:
      POSTGRES_DB: BtDamageResolver
      POSTGRES_USER: "${RESOLVER_USER:?err}"
      POSTGRES_PASSWORD: "${RESOLVER_PASSWORD:?err}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d BtDamageResolver"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s
    ports:
      - 65432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    restart: on-failure
    networks:
      - resolvernet

  # Redis
  redis:
    container_name: redis
    image: resolverredis:latest
    environment:
      REDIS_PASSWORD: "${RESOLVER_PASSWORD:?err}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s
    ports:
      - 63790:6379
    volumes:
      - redis-data:/db
    networks:
      - resolvernet
    restart: on-failure

networks:
  resolvernet:

volumes:
  grafana-data:
  postgres-data:
  redis-data:
  resolverclient-dpkeys:
